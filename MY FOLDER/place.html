/*NAVBUTTON*/
.navbar ul li{
  list-style: none;
  display: inline-block;
  margin: 10px 10px;
  position: relative;
}
.navbar ul li a{
  font-size: 25px;
  text-decoration: none;
  color: darkslateblue;
  font-family: Georgia;
  text-transform: uppercase;
}
.navbar ul li::after{
  content: '';
  height: 3px;
  width: 0;
  background: darkcyan;
  position: absolute;
  left: 0;
  bottom: -10px;
  transition: 0.5s;
}
.navbar ul li:hover::after{
  width: 100%;
}
